    <!-- Right Panel: Main Form Area -->
    <div class="w-full md:w-1/2 flex items-center justify-center px-6 md:px-12 py-12 bg-white">
        <div class="w-full max-w-[550px]">

            <!-- Header Content -->
            <div class="mb-10 text-center md:text-left">
                <h1 class="text-[32px] md:text-[38px] font-bold text-[#0f172a] tracking-tight mb-3">Facilities & Infrastructure</h1>
                <p class="text-[17px] text-[#334155] font-medium tracking-wide">Which matters most?</p>
            </div>

            <!-- Options Form -->
            <div class="flex flex-col gap-3.5 mb-10" id="options-container">
                <!-- Option 1 -->
                <label class="option-card flex items-center p-4 border-2 border-[#cbd5e1] rounded-lg cursor-pointer relative transition-colors hover:bg-slate-50">
                    <input type="radio" name="facility_factor" value="Modern labs" class="peer sr-only">
                    <div class="check-indicator w-6 h-6 rounded border-2 border-[#94a3b8] flex-shrink-0 flex items-center justify-center mr-4 transition-colors"></div>
                    <span class="text-[16px] font-medium text-[#1e293b]">Modern labs</span>
                </label>

                <!-- Option 2 -->
                <label class="option-card flex items-center p-4 border-2 border-[#cbd5e1] rounded-lg cursor-pointer relative transition-colors hover:bg-slate-50">
                    <input type="radio" name="facility_factor" value="Hostel facility" class="peer sr-only">
                    <div class="check-indicator w-6 h-6 rounded border-2 border-[#94a3b8] flex-shrink-0 flex items-center justify-center mr-4 transition-colors"></div>
                    <span class="text-[16px] font-medium text-[#1e293b]">Hostel facility</span>
                </label>

                <!-- Option 3 -->
                <label class="option-card flex items-center p-4 border-2 border-[#cbd5e1] rounded-lg cursor-pointer relative transition-colors hover:bg-slate-50">
                    <input type="radio" name="facility_factor" value="Library" class="peer sr-only">
                    <div class="check-indicator w-6 h-6 rounded border-2 border-[#94a3b8] flex-shrink-0 flex items-center justify-center mr-4 transition-colors"></div>
                    <span class="text-[16px] font-medium text-[#1e293b]">Library</span>
                </label>

                <!-- Option 4 -->
                <label class="option-card flex items-center p-4 border-2 border-[#cbd5e1] rounded-lg cursor-pointer relative transition-colors hover:bg-slate-50">
                    <input type="radio" name="facility_factor" value="Cafeteria quality" class="peer sr-only">
                    <div class="check-indicator w-6 h-6 rounded border-2 border-[#94a3b8] flex-shrink-0 flex items-center justify-center mr-4 transition-colors"></div>
                    <span class="text-[16px] font-medium text-[#1e293b]">Cafeteria quality</span>
                </label>

                <!-- Option 5 -->
                <label class="option-card flex items-center p-4 border-2 border-[#cbd5e1] rounded-lg cursor-pointer relative transition-colors hover:bg-slate-50">
                    <input type="radio" name="facility_factor" value="All of the above" class="peer sr-only">
                    <div class="check-indicator w-6 h-6 rounded border-2 border-[#94a3b8] flex-shrink-0 flex items-center justify-center mr-4 transition-colors"></div>
                    <span class="text-[16px] font-medium text-[#1e293b]">All of the above</span>
                </label>

                <!-- Option 6 (Other) -->
                <div class="flex flex-col gap-2">
                    <label class="option-card flex items-center p-4 border-2 border-[#cbd5e1] rounded-lg cursor-pointer relative transition-colors hover:bg-slate-50">
                        <input type="radio" name="facility_factor" value="Other" class="peer sr-only">
                        <div class="check-indicator w-6 h-6 rounded border-2 border-[#94a3b8] flex-shrink-0 flex items-center justify-center mr-4 transition-colors"></div>
                        <span class="text-[16px] font-medium text-[#1e293b]">Other</span>
                    </label>
                    <!-- Expandable Text Input -->
                    <input type="text" id="other-input" class="hidden w-full p-3.5 border-2 border-[#cbd5e1] rounded-lg focus:border-[#2563eb] focus:ring-2 focus:ring-[#bfdbfe] focus:outline-none transition-all text-[16px] text-[#1e293b]" placeholder="Please specify...">
                </div>
            </div>

            <!-- Navigation Buttons (Updated based on image) -->
            <div class="flex items-center gap-4">
                <!-- Back Button -->
                <button type="button" class="flex-1 md:flex-none px-10 py-3.5 bg-white border-[1.5px] border-[#cbd5e1] text-[#475569] font-bold text-[17px] rounded-xl hover:bg-[#f8fafc] transition-colors focus:outline-none focus:ring-2 focus:ring-slate-200">
                    Back
                </button>
                
                <!-- Continue Button -->
                <button type="button" id="next-btn" disabled class="flex-1 md:flex-none px-10 py-3.5 bg-[#b0b8c6] text-white font-bold text-[17px] rounded-xl transition-all duration-200 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-300">
                    Continue
                </button>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('.option-card');
            const nextBtn = document.getElementById('next-btn');
            const otherInput = document.getElementById('other-input');
            const checkIconSVG = `
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                </svg>
            `;

            // Button state classes
            const baseNextClasses = "flex-1 md:flex-none px-10 py-3.5 font-bold text-[17px] rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-300";
            const disabledNextClasses = `${baseNextClasses} bg-[#b0b8c6] text-white cursor-not-allowed`;
            const activeNextClasses = `${baseNextClasses} bg-[#2563eb] hover:bg-[#1d4ed8] text-white cursor-pointer`;

            options.forEach(option => {
                const radioInput = option.querySelector('input[type="radio"]');

                radioInput.addEventListener('change', () => {
                    // Reset all options
                    options.forEach(opt => {
                        opt.classList.remove('border-[#2563eb]', 'bg-blue-50/50'); 
                        opt.classList.add('border-[#cbd5e1]');
                        const checkIndicator = opt.querySelector('.check-indicator');
                        checkIndicator.classList.remove('bg-[#2563eb]', 'border-[#2563eb]');
                        checkIndicator.classList.add('border-[#94a3b8]');
                        checkIndicator.innerHTML = '';
                    });

                    // Set active option styles
                    option.classList.remove('border-[#cbd5e1]');
                    option.classList.add('border-[#2563eb]'); 
                    
                    const activeIndicator = option.querySelector('.check-indicator');
                    activeIndicator.classList.remove('border-[#94a3b8]');
                    activeIndicator.classList.add('bg-[#2563eb]', 'border-[#2563eb]');
                    activeIndicator.innerHTML = checkIconSVG;

                    // Handle "Other" text input logic
                    if (radioInput.value === 'Other') {
                        otherInput.classList.remove('hidden');
                        otherInput.focus();
                        const isInputValid = otherInput.value.trim() !== '';
                        nextBtn.disabled = !isInputValid;
                        nextBtn.className = isInputValid ? activeNextClasses : disabledNextClasses;
                    } else {
                        otherInput.classList.add('hidden');
                        nextBtn.disabled = false;
                        nextBtn.className = activeNextClasses;
                    }
                });
            });

            // Require text input for "Other" to enable the Continue button
            if (otherInput) {
                otherInput.addEventListener('input', () => {
                    const radioInput = document.querySelector('input[name="facility_factor"]:checked');
                    if (radioInput && radioInput.value === 'Other') {
                        const isInputValid = otherInput.value.trim() !== '';
                        nextBtn.disabled = !isInputValid;
                        nextBtn.className = isInputValid ? activeNextClasses : disabledNextClasses;
                    }
                });
            }

            // Click handler for Continue button
            nextBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (nextBtn.disabled) return;
                
                const selectedOption = document.querySelector('input[name="facility_factor"]:checked');
                if(selectedOption) {
                    const finalValue = selectedOption.value === 'Other' ? otherInput.value.trim() : selectedOption.value;
                    console.log('User selections saved:', finalValue);
                    // Add your actual navigation or submission logic here
                }
            });
        });
    </script>
