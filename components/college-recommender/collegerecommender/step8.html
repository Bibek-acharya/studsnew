<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Recommender - Activities</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Blue Theme Colors */
            --bg-left-panel: #e0f2fe; 
            --primary-blue: #2563eb;  
            --primary-blue-hover: #1d4ed8;
            --primary-blue-light: #eff6ff; 
            --text-main: #0f172a;     
            --text-secondary: #475569;
            --border-color: #cbd5e1;  
            --border-hover: #94a3b8;
            --btn-disabled-bg: #94a3b8;
            --btn-disabled-text: #f1f5f9;
            --progress-track: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
            background-color: #ffffff;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Layout */
        .left-panel {
            width: 45%; /* Increased width */
            background-color: var(--bg-left-panel);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border-right: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .right-panel {
            width: 55%; /* Decreased to compensate for the left panel */
            padding: 10rem 10% 3rem; /* Increased top padding to push content down */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* SVG Illustration Styling */
        .illustration {
            width: 100%;
            max-width: 250px;
            height: auto;
            mix-blend-mode: multiply;
        }

        /* Button Group & Secondary Button */
        .button-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .secondary-btn {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: 1.5px solid var(--border-color);
            background-color: white;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .secondary-btn:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        /* Main Content Area */
        .content-area {
            max-width: 600px;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .question-text {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        /* Custom Radio Options */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            background-color: white;
        }

        .option-label:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
        }

        /* Hide actual radio input */
        .option-label input[type="radio"] {
            display: none;
        }

        /* Custom visual square box */
        .custom-radio-box {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-radius: 6px; /* Changed to rectangular with rounded corners */
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background-color: transparent;
            position: relative;
        }

        .custom-radio-box::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Selected State Styling */
        .option-label:has(input[type="radio"]:checked) {
            border-color: var(--primary-blue);
            background-color: var(--primary-blue-light);
        }

        .option-label input[type="radio"]:checked + .custom-radio-box {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .option-label input[type="radio"]:checked + .custom-radio-box::after {
            transform: rotate(45deg) scale(1);
        }

        /* Keyboard Focus Outline */
        .option-label input[type="radio"]:focus-visible + .custom-radio-box {
            outline: 2px solid var(--primary-blue);
            outline-offset: 4px;
        }

        /* Next Button */
        .next-btn {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .next-btn:disabled {
            background-color: var(--btn-disabled-bg);
            color: var(--btn-disabled-text);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .next-btn:not(:disabled) {
            background-color: var(--primary-blue);
            color: white;
        }

        .next-btn:not(:disabled):hover {
            background-color: var(--primary-blue-hover);
            transform: translateY(-1px);
        }

        /* Completion Screen (Hidden by default) */
        .completion-screen {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
            padding-top: 2rem;
        }

        .completion-icon {
            width: 64px;
            height: 64px;
            background-color: #dcfce7;
            color: #16a34a;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .completion-icon svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }
            .left-panel {
                width: 100%;
                min-height: 250px;
                padding: 2rem 1rem;
            }
            .right-panel {
                width: 100%;
                flex-grow: 1;
                padding: 2rem 5%;
            }
            .illustration {
                max-width: 180px;
            }
        }
    </style>
</head>
<body>

,10.666,0,0,1-11-9.079h0a10.666,10.666,0,0,1,8.01-11.938l10.248-2.512L923.487,721c5.967,6.179,14.185,11.4,24.23,15.854l.118,16.415a11.971,11.971,0,0,1-11.464,12.046Z" transform="translate(185.782 387.455)" fill="#090814"/><path d="M318.536,605.319H.321v-3.3H318.679Z" transform="translate(1004.693 550.22)" fill="#e6e6e6"/><path d="M975.962,764.708l60.421,2.561a10.666,10.666,0,0,0,11-9.079h0a10.666,10.666,0,0,0-8.01-11.938l-10.248-2.512-40.279-23.347c-5.967,6.179-14.185,11.4-24.23,15.854l-.118,16.415a11.971,11.971,0,0,0,11.464,12.046Z" transform="translate(237.015 387.143)" fill="#090814"/><circle cx="32.904" cy="32.904" r="32.904" transform="translate(1121.887 535.313)" fill="#ed9da0"/><path d="M983.469,364.1a31.637,31.637,0,0,0-6.916-24.85c-5.614-6.643-15.024-12.081-30.636-9.516-34.062,5.6-43.884,33.953-40.547,41.084s13.566,23.662,13.566,23.662-7.507-16.364.641-19.695,39.679-16.453,50.684-10.541a19.726,19.726,0,0,1,10.849,16.617Z" transform="translate(206.306 185.994)" fill="#090814"/><path d="M971.847,603.811l-10.871,21.137a14.864,14.864,0,0,0,8,20.716h0A14.864,14.864,0,0,0,988.9,633.891l4.537-31.109,16.452-78.147-15-106.532-23.441,40.382C982.671,487.548,981.616,557.49,971.847,603.811Z" transform="translate(234.359 231.753)" fill="#ed9da0"/></g></svg>
    </div>

    <div class="right-panel">
        <div class="content-area" id="mainForm">
            <h1>Activities & Sports</h1>
            <p class="question-text">Are clubs, sports, and competitions important to you?</p>

            <div class="options-group">
                <!-- Option: Yes -->
                <label class="option-label">
                    <input type="radio" name="activity_importance" value="yes">
                    <div class="custom-radio-box"></div>
                    Yes, they are very important
                </label>

                <!-- Option: Somewhat -->
                <label class="option-label">
                    <input type="radio" name="activity_importance" value="somewhat">
                    <div class="custom-radio-box"></div>
                    Somewhat important
                </label>

                <!-- Option: No -->
                <label class="option-label">
                    <input type="radio" name="activity_importance" value="no">
                    <div class="custom-radio-box"></div>
                    No, I prefer to focus on academics
                </label>
            </div>

            <div class="button-group">
                <button class="secondary-btn" id="backBtn" onclick="console.log('Go Back')">Back</button>
                <button class="next-btn" id="nextBtn" disabled>Continue</button>
            </div>
        </div>

        <!-- Success/Next Step State -->
        <div class="content-area completion-screen" id="completionScreen">
            <div class="completion-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
            </div>
            <h1>Preferences Saved</h1>
            <p class="question-text">We've updated your college profile based on your activities preferences.</p>
            <button class="next-btn" onclick="location.reload()" style="margin-top: 1rem;">Start Over</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const radioInputs = document.querySelectorAll('input[name="activity_importance"]');
            const nextButton = document.getElementById('nextBtn');
            const mainForm = document.getElementById('mainForm');
            const completionScreen = document.getElementById('completionScreen');

            // Listen for changes on any radio button
            radioInputs.forEach(input => {
                input.addEventListener('change', () => {
                    // If any radio is checked, enable the Next button
                    if (document.querySelector('input[name="activity_importance"]:checked')) {
                        nextButton.disabled = false;
                    }
                });
            });

            // Handle Next Button Click (Simulate moving to next step)
            nextButton.addEventListener('click', () => {
                // Fade out current form
                mainForm.style.opacity = '0';
                mainForm.style.transition = 'opacity 0.3s ease';
                
                setTimeout(() => {
                    mainForm.style.display = 'none';
                    
                    // Show completion screen
                    completionScreen.style.display = 'block';
                }, 300);
            });
        });
    </script>
</body>
</html>
