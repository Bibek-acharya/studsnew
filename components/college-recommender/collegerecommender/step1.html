<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Persona Selection</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
        }

        .card-transition {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="antialiased text-slate-800 h-screen flex flex-col lg:flex-row overflow-hidden">

    <!-- Left Panel: Illustration -->
    <!-- Increased width to w-1/2 and changed background color to #e0f2fe -->
    <div class="hidden lg:flex w-1/2 bg-[#e0f2fe] items-center justify-center relative p-12 h-full" style="--bg-left-panel: #e0f2fe;">
        <!-- SVG Illustration perfectly centered -->

ne" stroke="#000" stroke-miterlimit="10" stroke-width="2" opacity="0.2"/><path d="M644.921,615.809l2.05,108.638a13.6,13.6,0,0,0,13.75,13.343l202.168-2.271A13.6,13.6,0,0,0,876.314,722.7l6.137-106.367a13.6,13.6,0,0,0-13.577-14.383H658.519a13.6,13.6,0,0,0-13.6,13.856Z" transform="translate(251.586 29.67)" fill="#090814"/><g transform="translate(885.188 282.736)"><path d="M662.151,702.584c5.506-12.151,12.906-23.553,16.432-36.419,4.226-15.42,2.58-31.736,2.077-47.717a149.817,149.817,0,0,1,3.577-42.106,72.4,72.4,0,0,1,20.813-36.235c26.889-24,53.277-25.728,86.11-15.735,12.944,3.94,26.732,11.441,29.942,24.585.484,1.985.7,4.029,1.243,6,2.688,9.786,12.7,15.979,16.312,25.463,4.672,12.267-2.532,25.607-3.474,38.7-1.1,15.286,6.415,29.726,13.821,43.143,4.4,7.976,8.981,16.472,8.544,25.572a32.3,32.3,0,0,1-4.421,14.1,53.753,53.753,0,0,1-45.154,25.884,28.326,28.326,0,0,1-16.913-3.993c-8.013-5.517-10.36-16.627-8.691-26.212s6.534-18.253,10.347-27.2c1.17-2.747,2.225-5.54,3.2-8.361a57.416,57.416,0,1,0-37.873,6.424,77.777,77.777,0,0,1-3.766,43.247,163.309,163.309,0,0,1-18.16,31.664,43.707,43.707,0,0,1-11.569,12.947,41.046,41.046,0,0,1-9.856,4.209c-14.493,4.661-6.932,8.411-22.01,6.315s-30.012-11.191-35.15-25.522C653.028,728.768,656.645,714.734,662.151,702.584Z" transform="translate(-655.498 -518.627)" fill="#090814"/><ellipse cx="62.629" cy="35.49" rx="62.629" ry="35.49" transform="translate(46.663 22.315)" fill="#090814"/></g></g></svg>
        </div>
    </div>

    <!-- Right Panel: Interactive Content -->
    <div class="flex-1 overflow-y-auto px-6 py-10 sm:px-12 lg:px-20 flex flex-col justify-center h-full">
        
        <div class="max-w-2xl mx-auto w-full">
            <!-- Titles -->
            <div class="mb-10">
                <h1 class="text-3xl sm:text-[2.5rem] font-bold text-slate-900 mb-2 leading-tight tracking-tight">Which type of student are you?</h1>
                <p class="text-slate-500 text-lg">Select what matches you best:</p>
            </div>

            <!-- Selection Grid -->
            <fieldset>
                <legend class="sr-only">Choose your student persona</legend>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-5">
                    
                    <!-- Card 1: Academic Topper -->
                    <label class="group relative flex flex-col p-6 bg-white cursor-pointer rounded-2xl border-2 border-slate-100 card-transition hover:border-blue-200">
                        <input type="radio" name="student_type" value="academic" class="sr-only">

                        <div class="relative z-10 flex justify-between items-start mb-4">
                            <!-- Left Icon -->
                            <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                                <i data-lucide="book-open" class="w-6 h-6"></i>
                            </div>
                            
                            <!-- Right Checkmark Box -->
                            <div class="w-6 h-6 rounded border-2 border-slate-200 flex items-center justify-center bg-white card-transition group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-600">
                                <i data-lucide="check" class="w-4 h-4 text-white opacity-0 group-has-[:checked]:opacity-100 scale-50 group-has-[:checked]:scale-100 transition-all duration-300"></i>
                            </div>
                        </div>
                        <h3 class="font-bold text-lg text-slate-900 mb-1.5">Academic Topper</h3>
                        <p class="text-sm text-slate-500 leading-relaxed">I want strong academics, tough competition, and high GPA results.</p>
                    </label>

                    <!-- Card 2: Campus Life Lover -->
                    <label class="group relative flex flex-col p-6 bg-white cursor-pointer rounded-2xl border-2 border-slate-100 card-transition hover:border-pink-200">
                        <input type="radio" name="student_type" value="campus_life" class="sr-only">

                        <div class="relative z-10 flex justify-between items-start mb-4">
                            <div class="w-12 h-12 rounded-xl bg-pink-50 text-pink-500 flex items-center justify-center">
                                <i data-lucide="music" class="w-6 h-6"></i>
                            </div>
                            <div class="w-6 h-6 rounded border-2 border-slate-200 flex items-center justify-center bg-white card-transition group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-600">
                                <i data-lucide="check" class="w-4 h-4 text-white opacity-0 group-has-[:checked]:opacity-100 scale-50 group-has-[:checked]:scale-100 transition-all duration-300"></i>
                            </div>
                        </div>
                        <h3 class="font-bold text-lg text-slate-900 mb-1.5">Campus Life Lover</h3>
                        <p class="text-sm text-slate-500 leading-relaxed">I want fun events, clubs, networking, and an active college life.</p>
                    </label>

                    <!-- Card 3: Career-Focused Planner -->
                    <label class="group relative flex flex-col p-6 bg-white cursor-pointer rounded-2xl border-2 border-slate-100 card-transition hover:border-purple-200">
                        <input type="radio" name="student_type" value="career" class="sr-only">

                        <div class="relative z-10 flex justify-between items-start mb-4">
                            <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center">
                                <i data-lucide="briefcase" class="w-6 h-6"></i>
                            </div>
                            <div class="w-6 h-6 rounded border-2 border-slate-200 flex items-center justify-center bg-white card-transition group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-600">
                                <i data-lucide="check" class="w-4 h-4 text-white opacity-0 group-has-[:checked]:opacity-100 scale-50 group-has-[:checked]:scale-100 transition-all duration-300"></i>
                            </div>
                        </div>
                        <h3 class="font-bold text-lg text-slate-900 mb-1.5">Career-Focused Planner</h3>
                        <p class="text-sm text-slate-500 leading-relaxed">I care about internships, job placement, and future salary.</p>
                    </label>

                    <!-- Card 4: Balanced Explorer -->
                    <label class="group relative flex flex-col p-6 bg-white cursor-pointer rounded-2xl border-2 border-slate-100 card-transition hover:border-orange-200">
                        <input type="radio" name="student_type" value="balanced" class="sr-only">

                        <div class="relative z-10 flex justify-between items-start mb-4">
                            <div class="w-12 h-12 rounded-xl bg-orange-50 text-orange-500 flex items-center justify-center">
                                <i data-lucide="compass" class="w-6 h-6"></i>
                            </div>
                            <div class="w-6 h-6 rounded border-2 border-slate-200 flex items-center justify-center bg-white card-transition group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-600">
                                <i data-lucide="check" class="w-4 h-4 text-white opacity-0 group-has-[:checked]:opacity-100 scale-50 group-has-[:checked]:scale-100 transition-all duration-300"></i>
                            </div>
                        </div>
                        <h3 class="font-bold text-lg text-slate-900 mb-1.5">Balanced Explorer</h3>
                        <p class="text-sm text-slate-500 leading-relaxed">I want academics + social life + extracurricular activities.</p>
                    </label>

                </div>
            </fieldset>

            <!-- Bottom Action Button -->
            <div class="mt-8">
                <!-- Changed 'Next Step' to 'Continue' -->
                <button id="nextBtn" disabled class="w-full sm:w-auto px-8 py-3.5 text-sm rounded-xl font-semibold text-slate-400 bg-slate-100 cursor-not-allowed transition-all duration-300 
                data-[active=true]:bg-blue-600 data-[active=true]:text-white data-[active=true]:cursor-pointer data-[active=true]:hover:bg-blue-700 data-[active=true]:hover:shadow-lg data-[active=true]:hover:shadow-blue-600/30">
                    Continue
                </button>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            const radioButtons = document.querySelectorAll('input[name="student_type"]');
            const nextButton = document.getElementById('nextBtn');

            // Listen for changes on any card radio button
            radioButtons.forEach(radio => {
                radio.addEventListener('change', () => {
                    const isSelected = Array.from(radioButtons).some(r => r.checked);
                    
                    if (isSelected) {
                        // Activate the "Continue" button
                        nextButton.removeAttribute('disabled');
                        nextButton.setAttribute('data-active', 'true');
                        
                        // Explicitly removing any potential backdrop blur effects upon card selection
                        document.body.style.backdropFilter = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
