<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Recommender - Campus Life</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Blue Theme Colors */
            --bg-left-panel: #e0f2fe; 
            --primary-blue: #2563eb;  
            --primary-blue-hover: #1d4ed8;
            --primary-blue-light: #eff6ff; 
            --text-main: #0f172a;     
            --text-secondary: #475569;
            --border-color: #cbd5e1;  
            --border-hover: #94a3b8;
            --btn-disabled-bg: #94a3b8;
            --btn-disabled-text: #f1f5f9;
            --progress-track: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
            background-color: #ffffff;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Layout */
        .left-panel {
            width: 45%;
            background-color: var(--bg-left-panel);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border-right: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .right-panel {
            width: 55%;
            padding: 10rem 10% 3rem;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* SVG Illustration Styling */
        .illustration {
            width: 100%;
            max-width: 320px; /* Increased slightly from 250px */
            height: auto;
            mix-blend-mode: multiply;
        }

        /* Button Group & Secondary Button */
        .button-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .secondary-btn {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: 1.5px solid var(--border-color);
            background-color: white;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .secondary-btn:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        /* Main Content Area */
        .content-area {
            max-width: 600px;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .question-text {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        /* Custom Radio Options */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            background-color: white;
        }

        .option-label:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
        }

        .option-label input[type="radio"] {
            display: none;
        }

        /* Custom visual square box */
        .custom-radio-box {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background-color: transparent;
            position: relative;
        }

        .custom-radio-box::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Selected State Styling */
        .option-label:has(input[type="radio"]:checked) {
            border-color: var(--primary-blue);
            background-color: var(--primary-blue-light);
        }

        .option-label input[type="radio"]:checked + .custom-radio-box {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .option-label input[type="radio"]:checked + .custom-radio-box::after {
            transform: rotate(45deg) scale(1);
        }

        /* Next Button */
        .next-btn {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .next-btn:disabled {
            background-color: var(--btn-disabled-bg);
            color: var(--btn-disabled-text);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .next-btn:not(:disabled) {
            background-color: var(--primary-blue);
            color: white;
        }

        .next-btn:not(:disabled):hover {
            background-color: var(--primary-blue-hover);
            transform: translateY(-1px);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }
            .left-panel {
                width: 100%;
                min-height: 350px;
                padding: 2rem 1rem;
            }
            .right-panel {
                width: 100%;
                padding: 2rem 5%;
            }
        }
    </style>
</head>

    <div class="right-panel">
        <div class="content-area" id="mainForm">
            <h1>Academics vs Campus Life</h1>
            <p class="question-text">Choose one:</p>

            <div class="options-group">
                <!-- Option: Academics -->
                <label class="option-label">
                    <input type="radio" name="preference" value="academics">
                    <div class="custom-radio-box"></div>
                    Academics matter more than fun
                </label>

                <!-- Option: Campus Life -->
                <label class="option-label">
                    <input type="radio" name="preference" value="campus_life">
                    <div class="custom-radio-box"></div>
                    Campus life matters more
                </label>

                <!-- Option: Both -->
                <label class="option-label">
                    <input type="radio" name="preference" value="both">
                    <div class="custom-radio-box"></div>
                    Both equally important
                </label>
            </div>

            <div class="button-group">
                <button class="secondary-btn" id="backBtn">Back</button>
                <button class="next-btn" id="nextBtn" disabled>Continue</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const radioInputs = document.querySelectorAll('input[name="preference"]');
            const nextButton = document.getElementById('nextBtn');

            radioInputs.forEach(input => {
                input.addEventListener('change', () => {
                    if (document.querySelector('input[name="preference"]:checked')) {
                        nextButton.disabled = false;
                    }
                });
            });
        });
    </script>
</body>
</html>
